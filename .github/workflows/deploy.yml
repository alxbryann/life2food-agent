name: Deploy Lifo Agent to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key (robusto contra errores de formato)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo ✅ conectado"

      - name: Deploy agent via rsync
        run: |
          set -e
          REMOTE_PATH="/home/${{ secrets.SSH_USER }}/life2food-agent"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${REMOTE_PATH}"

          # Si el repo del workflow es el monorepo, el código está en ./life2food-agent/.
          # Si es el repo aislado, el código ya está en ./ (raíz).
          SRC_DIR="."
          if [ ! -f "./Dockerfile" ] && [ -f "./life2food-agent/Dockerfile" ]; then
            SRC_DIR="./life2food-agent"
          fi

          rsync -avz \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            "${SRC_DIR}/" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${REMOTE_PATH}/"

      - name: Build Docker image and restart container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -e
          cd /home/${{ secrets.SSH_USER }}/life2food-agent

          echo "  → Construyendo imagen..."
          docker build -t lifo-agent:latest .

          echo "  → Reemplazando contenedor..."
          docker stop lifo-agent 2>/dev/null || true
          docker rm lifo-agent 2>/dev/null || true

          docker run -d \
            --name lifo-agent \
            --restart unless-stopped \
            --env-file /home/${{ secrets.SSH_USER }}/life2food-agent/.env \
            -p 3002:3001 \
            lifo-agent:latest

          echo "  → Limpiando imágenes antiguas..."
          docker image prune -f --filter "label!=keep" 2>/dev/null || true

          sleep 2
          STATUS=$(curl -s http://localhost:3002/health || true)
          echo "  Health check: $STATUS"
          EOF

